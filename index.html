<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>にゃんこカルテ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --main-pink: #ffb6c1; --dark-pink: #d81b60; --bg-color: #fffafb; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: var(--dark-pink); font-size: 1.5em; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--main-pink); }
        select, input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background-color: var(--main-pink); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: var(--dark-pink); }
        .cat-list-item { background: #fef0f3; padding: 10px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        #photo-preview, .saved-photo { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
        canvas { background: white; border-radius: 10px; margin-top: 20px; }
        .support-card { background: #fff5f8; border: 2px solid var(--main-pink); border-radius: 15px; padding: 20px; text-align: center; margin-top: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐾 にゃんこカルテ 🐾</h1>

    <div class="card">
        <h3>猫ちゃんを登録（最大8匹）</h3>
        <input type="text" id="cat-name-input" placeholder="猫ちゃんの名前を入力">
        <button onclick="addCat()">新しい猫を追加</button>
        <div id="cat-list"></div>
    </div>

    <div class="card">
        <h3>今日の記録</h3>
        <select id="cat-selector"><option value="">猫ちゃんを選択</option></select>
        <input type="number" id="weight" step="0.1" placeholder="体重 (kg)">
        <textarea id="memo" placeholder="今日の様子・メモ"></textarea>
        <input type="file" id="photo-input" accept="image/*,video/*">
        <img id="photo-preview">
        <button onclick="saveRecord()">記録を保存する</button>
    </div>

    <div class="card">
        <h3>健康グラフと履歴</h3>
        <select id="view-selector" onchange="updateView()"><option value="">猫ちゃんを選択</option></select>
        <canvas id="weightChart"></canvas>
        <div id="history-list" style="margin-top:20px;"></div>
    </div>

    <div class="support-card">
        <h3 style="color: var(--dark-pink);">🐾 活動を応援する 🐾</h3>
        <p style="font-size: 0.85em; color: #666;">スタンプの収益は保護猫たちの食費や医療費に充てさせていただきます。</p>
        <a href="https://store.line.me/stickershop/author/6094566/ja" target="_blank" style="text-decoration: none;">
            <div style="background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; width: 90%; border: 1px solid var(--main-pink);">
                <img src="https://stickershop.line-scdn.net/stickershop/v1/product/33876188/LINEStorePC/main.png" alt="忍者もけまる" style="width: 80px;">
                <h4 style="margin: 10px 0 5px 0; color: #333;">LINEスタンプ一覧</h4>
                <p style="font-size: 0.75em; color: #ff69b4; font-weight: bold;">新作もこちらからチェック！</p>
                <div style="background: #ff69b4; color: white; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-top: 10px;">応援（購入）ページへ</div>
            </div>
        </a>
        <div style="margin-top: 15px;">
            <a href="【ここにご支援サイトのURL】" target="_blank" style="color: #ff69b4; font-size: 0.8em;">保護猫活動を支援する（外部サイト）</a>
        </div>
    </div>
</div>

<script>
    let db;
    const request = indexedDB.open("NyankoKarteDB", 2);

    request.onupgradeneeded = (e) => {
        db = e.target.result;
        if (!db.objectStoreNames.contains("cats")) db.createObjectStore("cats", { keyPath: "id", autoIncrement: true });
        if (!db.objectStoreNames.contains("records")) db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
    };

    request.onsuccess = (e) => {
        db = e.target.result;
        loadCats();
    };

    function addCat() {
        const name = document.getElementById("cat-name-input").value;
        if (!name) return;
        const transaction = db.transaction(["cats"], "readwrite");
        const store = transaction.objectStore("cats");
        store.count().onsuccess = (e) => {
            if (e.target.result >= 8) { alert("登録できるのは8匹までです"); return; }
            store.add({ name: name }).onsuccess = () => {
                document.getElementById("cat-name-input").value = "";
                loadCats();
            };
        };
    }

    function loadCats() {
        const transaction = db.transaction(["cats"], "readonly");
        const store = transaction.objectStore("cats");
        store.getAll().onsuccess = (e) => {
            const cats = e.target.result;
            const list = document.getElementById("cat-list");
            const sel1 = document.getElementById("cat-selector");
            const sel2 = document.getElementById("view-selector");
            list.innerHTML = "";
            sel1.innerHTML = '<option value="">猫ちゃんを選択</option>';
            sel2.innerHTML = '<option value="">猫ちゃんを選択</option>';
            cats.forEach(cat => {
                list.innerHTML += `<div class="cat-list-item"><span>${cat.name}</span><button style="width:auto; padding:5px 10px;" onclick="deleteCat(${cat.id})">削除</button></div>`;
                sel1.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
                sel2.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            });
        };
    }

    function deleteCat(id) {
        if (confirm("この猫ちゃんのデータを削除しますか？")) {
            db.transaction(["cats"], "readwrite").objectStore("cats").delete(id).onsuccess = loadCats;
        }
    }

    function saveRecord() {
        const catId = document.getElementById("cat-selector").value;
        const weight = document.getElementById("weight").value;
        const memo = document.getElementById("memo").value;
        const photoFile = document.getElementById("photo-input").files[0];

        if (!catId) { alert("猫ちゃんを選択してください"); return; }

        const record = {
            catId: parseInt(catId),
            weight: parseFloat(weight),
            memo: memo,
            date: new Date().toLocaleDateString(),
            photo: photoFile || null
        };

        db.transaction(["records"], "readwrite").objectStore("records").add(record).onsuccess = () => {
            alert("保存しました！");
            document.getElementById("weight").value = "";
            document.getElementById("memo").value = "";
            document.getElementById("photo-input").value = "";
            updateView();
        };
    }

    let myChart;
    function updateView() {
        const catId = parseInt(document.getElementById("view-selector").value);
        if (!catId) return;

        const transaction = db.transaction(["records"], "readonly");
        const store = transaction.objectStore("records");
        store.getAll().onsuccess = (e) => {
            const records = e.target.result.filter(r => r.catId === catId);
            const history = document.getElementById("history-list");
            history.innerHTML = "<h4>過去の記録</h4>";
            
            const labels = [];
            const data = [];

            records.reverse().forEach(r => {
                labels.push(r.date);
                data.push(r.weight);
                let photoHtml = "";
                if (r.photo) {
                    const url = URL.createObjectURL(r.photo);
                    photoHtml = r.photo.type.startsWith("video") ? 
                        `<video src="${url}" controls style="width:100%; border-radius:10px;"></video>` : 
                        `<img src="${url}" style="width:100%; border-radius:10px;">`;
                }
                history.innerHTML += `<div class="card" style="font-size:0.9em;"><strong>${r.date}</strong><br>体重: ${r.weight}kg<br>${r.memo}<br>${photoHtml}</div>`;
            });

            if (myChart) myChart.destroy();
            const ctx = document.getElementById('weightChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.reverse(),
                    datasets: [{ label: '体重推移 (kg)', data: data.reverse(), borderColor: '#d81b60', tension: 0.1 }]
                }
            });
        };
    }
</script>
</body>
</html>
