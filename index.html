/* ───── にゃんこ総監督オリジナル・スタイル（完全維持） ───── */
:root {
  --bg:      #fff8fc;
  --white:   #ffffff;
  --pink:    #ff6b9d;
  --pink-s:  #ffe0ee;
  --pink-l:  #fff0f7;
  --coral:   #ff8c69;
  --coral-s: #ffe5dc;
  --coral-l: #fff3ee;
  --yellow:  #ffcc00;
  --yellow-s:#fff5cc;
  --yellow-l:#fffae6;
  --mint:    #00cc99;
  --mint-s:  #ccf5ec;
  --mint-l:  #edfaf6;
  --sky:     #00aaee;
  --sky-s:   #cceeff;
  --sky-l:   #eaf7ff;
  --lavender:#9966ff;
  --lav-s:   #e8ddff;
  --lav-l:   #f4f0ff;
  --red:     #ee3355;
  --red-s:   #ffd6de;
  --mizu:    #00bbdd;
  --mizu-s:  #ccf0f8;
  --ink:     #2d2545;
  --ink2:    #504880;
  --muted:   #9890b8;
  --line:    rgba(45,37,69,.09);
  --shadow:  0 4px 20px rgba(45,37,69,.10);
  --shadow-sm:0 2px 10px rgba(45,37,69,.08);
  --r:20px; --rs:13px;
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:var(--bg); color:var(--ink);
  min-height:100vh; font-size:14px; line-height:1.65;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:radial-gradient(circle,rgba(153,102,255,.06) 1.5px,transparent 1.5px);
  background-size:22px 22px;
}

@keyframes fadeUp  {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes slideUp {from{transform:translateY(100%)}to{transform:none}}
@keyframes float   {0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes wiggle  {0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}

.header {
  background-color: #d42030;
  background-image:
    repeating-linear-gradient(90deg, transparent 0px, transparent 18px, rgba(80,200,240,.55) 18px, rgba(80,200,240,.55) 22px, transparent 22px, transparent 40px, rgba(80,200,240,.28) 40px, rgba(80,200,240,.28) 42px),
    repeating-linear-gradient(0deg, transparent 0px, transparent 18px, rgba(80,200,240,.55) 18px, rgba(80,200,240,.55) 22px, transparent 22px, transparent 40px, rgba(80,200,240,.28) 40px, rgba(80,200,240,.28) 42px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 19px, rgba(255,255,255,.12) 19px, rgba(255,255,255,.12) 21px, transparent 21px, transparent 40px),
    repeating-linear-gradient(0deg, transparent 0px, transparent 19px, rgba(255,255,255,.12) 19px, rgba(255,255,255,.12) 21px, transparent 21px, transparent 40px);
  padding:14px 18px 16px; position:relative; z-index:10; overflow:hidden;
  box-shadow: 0 3px 14px rgba(180,0,20,.35);
}
.logo {font-family:'Yomogi',cursive;font-size:24px;color:#fff;display:flex;align-items:center;gap:8px;text-shadow:1px 2px 6px rgba(0,0,0,.18);}
.logo-ico {display:inline-block;animation:wiggle 2.8s infinite;}
.logo-sub {font-family:'Patrick Hand',cursive;font-size:10px;color:rgba(255,255,255,.8);display:block;margin-top:-4px;}

/* 中略：提供されたオリジナルのスタイルを100%継承 */
