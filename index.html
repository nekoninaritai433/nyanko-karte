<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="にゃんこカルテ">
<meta name="theme-color" content="#d42030">
<link id="pwa-manifest" rel="manifest">
<link id="apple-icon" rel="apple-touch-icon">
<title>🐾 にゃんこカルテ</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=M+PLUS+Rounded+1c:wght@400;500;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #fff8fc;
  --white:   #ffffff;

  /* vivid pastels */
  --pink:    #ff6b9d;
  --pink-s:  #ffe0ee;
  --pink-l:  #fff0f7;
  --coral:   #ff8c69;
  --coral-s: #ffe5dc;
  --coral-l: #fff3ee;
  --yellow:  #ffcc00;
  --yellow-s:#fff5cc;
  --yellow-l:#fffae6;
  --mint:    #00cc99;
  --mint-s:  #ccf5ec;
  --mint-l:  #edfaf6;
  --sky:     #00aaee;
  --sky-s:   #cceeff;
  --sky-l:   #eaf7ff;
  --lavender:#9966ff;
  --lav-s:   #e8ddff;
  --lav-l:   #f4f0ff;
  --red:     #ee3355;
  --red-s:   #ffd6de;
  --mizu:    #00bbdd;
  --mizu-s:  #ccf0f8;

  --ink:     #2d2545;
  --ink2:    #504880;
  --muted:   #9890b8;
  --line:    rgba(45,37,69,.09);
  --shadow:  0 4px 20px rgba(45,37,69,.10);
  --shadow-sm:0 2px 10px rgba(45,37,69,.08);
  --r:20px; --rs:13px;
}

* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:var(--bg); color:var(--ink);
  min-height:100vh; font-size:14px; line-height:1.65;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:radial-gradient(circle,rgba(153,102,255,.06) 1.5px,transparent 1.5px);
  background-size:22px 22px;
}

@keyframes fadeUp  {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes slideUp {from{transform:translateY(100%)}to{transform:none}}
@keyframes float   {0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes wiggle  {0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes spin    {to{transform:rotate(360deg)}}
@keyframes shimmer {0%{background-position:200% center}100%{background-position:-200% center}}

/* ─ HEADER (tartan check: red base + light blue lines) ─ */
.header {
  background-color: #d42030;
  background-image:
    /* 水色の太線（縦） */
    repeating-linear-gradient(90deg,
      transparent 0px, transparent 18px,
      rgba(80,200,240,.55) 18px, rgba(80,200,240,.55) 22px,
      transparent 22px, transparent 40px,
      rgba(80,200,240,.28) 40px, rgba(80,200,240,.28) 42px
    ),
    /* 水色の太線（横） */
    repeating-linear-gradient(0deg,
      transparent 0px, transparent 18px,
      rgba(80,200,240,.55) 18px, rgba(80,200,240,.55) 22px,
      transparent 22px, transparent 40px,
      rgba(80,200,240,.28) 40px, rgba(80,200,240,.28) 42px
    ),
    /* 白の細線（交差ハイライト） */
    repeating-linear-gradient(90deg,
      transparent 0px, transparent 19px,
      rgba(255,255,255,.12) 19px, rgba(255,255,255,.12) 21px,
      transparent 21px, transparent 40px
    ),
    repeating-linear-gradient(0deg,
      transparent 0px, transparent 19px,
      rgba(255,255,255,.12) 19px, rgba(255,255,255,.12) 21px,
      transparent 21px, transparent 40px
    );
  padding:14px 18px 16px; position:relative; z-index:10; overflow:hidden;
  box-shadow: 0 3px 14px rgba(180,0,20,.35);
}
.header::before { display:none; }
.header::after  { display:none; }
.header-row {display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
.logo {font-family:'Yomogi',cursive;font-size:24px;color:#fff;letter-spacing:.06em;display:flex;align-items:center;gap:8px;text-shadow:1px 2px 6px rgba(0,0,0,.18);}
.logo-ico {display:inline-block;animation:wiggle 2.8s ease-in-out infinite;}
.logo-sub {font-family:'Patrick Hand',cursive;font-size:10px;color:rgba(255,255,255,.8);letter-spacing:.18em;display:block;margin-top:-4px;}
.header-btns {display:flex;gap:8px;}
.add-btn,.save-btn {
  height:36px; border-radius:50px; border:none;
  background:rgba(255,255,255,.95); cursor:pointer; font-weight:900;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 3px 12px rgba(0,0,0,.18); transition:transform .13s;
}
.add-btn  {width:36px; border-radius:50%; font-size:20px; color:var(--red); font-family:serif;}
.save-btn {padding:0 14px; font-family:'Yomogi',cursive; font-size:12px; color:var(--ink2); gap:4px;}
.add-btn:active,.save-btn:active {transform:scale(.92);}

/* ─ CAT SCROLL ─ */
.cat-scroll {
  padding:14px 14px 4px; display:flex; gap:10px; overflow-x:auto; scrollbar-width:none;
  background:var(--white); border-bottom:3px solid var(--pink-s); position:relative; z-index:1;
}
.cat-scroll::-webkit-scrollbar {display:none;}
.cat-card {
  flex-shrink:0; width:80px; border-radius:18px;
  padding:10px 6px 9px; text-align:center; cursor:pointer;
  box-shadow:var(--shadow-sm); transition:all .2s cubic-bezier(.34,1.56,.64,1);
  position:relative; overflow:hidden; border:2.5px solid transparent;
}
.cat-card::before {content:'';position:absolute;top:0;left:0;right:0;height:4px;}
.cat-card.active {border-color:var(--red);transform:translateY(-4px) scale(1.04);box-shadow:0 8px 24px rgba(238,51,85,.22);}
.cat-avatar {width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.75);border:2.5px solid rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 5px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.cat-name {font-family:'Yomogi',cursive;font-size:11px;color:var(--ink2);}
.cat-card.active .cat-name {color:var(--red);font-weight:700;}
.cat-edit-btn {
  font-size:12px; margin-top:4px; cursor:pointer;
  opacity:.6; transition:opacity .15s;
  line-height:1;
}
.cat-card:hover .cat-edit-btn { opacity:.9; }
.cat-card.active .cat-edit-btn { opacity:.9; }

/* ─ TABS ─ */
.tab-row {
  display:flex; gap:6px; padding:10px 12px 0;
  overflow-x:auto; scrollbar-width:none;
  background:var(--white); border-bottom:2px solid var(--pink-s);
}
.tab-row::-webkit-scrollbar {display:none;}
.tab-pill {
  flex-shrink:0; padding:8px 15px; border-radius:50px;
  font-family:'Yomogi',cursive; font-size:12px;
  background:var(--bg); border:2px solid var(--line);
  color:var(--muted); cursor:pointer; transition:all .18s;
  white-space:nowrap; margin-bottom:8px;
}
.tab-pill.active {color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,.15);}
.tp-home    .tab-pill.active, .tp-home.active    {background:var(--pink);}
.tp-log     .tab-pill.active, .tp-log.active     {background:var(--sky);}
.tp-symptom .tab-pill.active, .tp-symptom.active {background:var(--coral);}
.tp-vaccine .tab-pill.active, .tp-vaccine.active {background:var(--mint);}
.tp-food    .tab-pill.active, .tp-food.active    {background:var(--yellow);color:var(--ink)!important;}
.tp-toilet  .tab-pill.active, .tp-toilet.active  {background:var(--lavender);}
.tp-diary   .tab-pill.active, .tp-diary.active   {background:linear-gradient(135deg,var(--pink),var(--lavender));}

/* ─ MAIN ─ */
.main {padding:12px 13px 110px;position:relative;z-index:1;}
.section {display:none;}
.section.active {display:block;animation:fadeUp .28s ease;}

/* ─ CARD ─ */
.card {
  background:var(--white); border-radius:var(--r);
  margin-bottom:16px; box-shadow:var(--shadow);
  overflow:hidden; border:2px solid rgba(45,37,69,.06);
}
.card-band {height:6px;}
.cb-pink    {background:linear-gradient(90deg,var(--pink),#ffaacc);}
.cb-sky     {background:linear-gradient(90deg,var(--sky),#88ddff);}
.cb-mint    {background:linear-gradient(90deg,var(--mint),#88eedd);}
.cb-yellow  {background:linear-gradient(90deg,var(--yellow),#ffe066);}
.cb-lavender{background:linear-gradient(90deg,var(--lavender),#cc99ff);}
.cb-coral   {background:linear-gradient(90deg,var(--coral),#ffbb99);}
.cb-ygreen  {background:linear-gradient(90deg,#7abf00,#aadd44);}
.cb-rainbow {background:linear-gradient(90deg,var(--pink),var(--coral),var(--yellow),var(--mint),var(--sky),var(--lavender));}

.card-head {display:flex;align-items:center;gap:10px;padding:14px 16px 0;margin-bottom:12px;}
.card-icon {width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;animation:float 3.5s ease-in-out infinite;}
.ci-pink    {background:var(--pink-s);}
.ci-sky     {background:var(--sky-s);}
.ci-mint    {background:var(--mint-s);}
.ci-yellow  {background:var(--yellow-s);}
.ci-lavender{background:var(--lav-s);}
.ci-coral   {background:var(--coral-s);}
.ci-ygreen  {background:#e8f8cc;}
.card-title {font-family:'Yomogi',cursive;font-size:17px;color:var(--ink);letter-spacing:.04em;}
.card-body  {padding:0 16px 16px;}

/* ─ BUTTONS ─ */
.btn {
  padding:12px 22px; border-radius:50px; cursor:pointer;
  font-family:'Yomogi',cursive; font-size:14px; letter-spacing:.04em;
  transition:transform .12s,box-shadow .12s; border:none;
}
.btn:active {transform:scale(.96);}
.btn-pink   {background:linear-gradient(135deg,var(--pink),#ff99bb);  color:#fff;box-shadow:0 4px 16px rgba(255,107,157,.35);}
.btn-sky    {background:linear-gradient(135deg,var(--sky),#55ccff);   color:#fff;box-shadow:0 4px 16px rgba(0,170,238,.35);}
.btn-yellow {background:linear-gradient(135deg,var(--yellow),#ffdd55);color:var(--ink);box-shadow:0 4px 16px rgba(255,204,0,.35);}
.btn-coral  {background:linear-gradient(135deg,var(--coral),#ffaa88); color:#fff;box-shadow:0 4px 16px rgba(255,140,105,.35);}
.btn-full   {width:100%;text-align:center;}

.bottom-nav {
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);
  border-top:2px solid var(--pink-s);
  display:flex;padding:8px 0 20px;
  box-shadow:0 -4px 20px rgba(45,37,69,.08);
}
.bottom-nav::before {
  content:'';position:absolute;top:-4px;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--pink),var(--coral),var(--yellow),var(--mint),var(--sky),var(--lavender),var(--pink));
}
.nav-item {flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--muted);font-size:9px;font-family:'Yomogi',cursive;transition:all .2s;padding:4px 0;}
.nav-item.active {color:var(--ink);}

/* ─ PWA / iOS safe area ─ */
@supports (padding-top: env(safe-area-inset-top)) {
  .header { padding-top: calc(14px + env(safe-area-inset-top)); }
  .bottom-nav { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="logo"><span class="logo-ico">🐾</span>にゃんこカルテ<div class="logo-sub">nyanko health karte</div></div>
  </div>
</div>

<div class="main">

<div id="page-home" class="section active">
  <div class="card">
    <div class="card-band cb-rainbow"></div>
    <div class="card-head"><div class="card-icon ci-pink">🐱</div><div class="card-title">こんにちは！</div></div>
    <div class="card-body">
      <p style="font-family:'Yomogi',cursive; font-size:14px;">今日も猫ちゃんと素敵な一日を🐾</p>
    </div>
  </div>

  <div class="card">
    <div class="card-band cb-rainbow"></div>
    <div class="card-head"><div class="card-icon ci-yellow">🎁</div><div class="card-title">開発者を応援する</div></div>
    <div class="card-body">
      <div style="font-family:'Patrick Hand',cursive;font-size:12px;color:var(--muted);margin-bottom:10px">
        公園で暮らす40匹の猫ちゃんたちを過酷な環境から救うため、アプリ開発と保護活動をしています🐾
      </div>
      <a href="https://store.line.me/stickershop/product/33876188/ja" target="_blank" style="text-decoration:none;">
        <button class="btn btn-yellow btn-full" style="margin-bottom:8px">🥷 忍者もけまるスタンプを見る</button>
      </a>
      <a href="https://note.com/your_profile" target="_blank" style="text-decoration:none;">
        <button class="btn btn-coral btn-full">💖 保護猫活動を支援する</button>
      </a>
    </div>
  </div>
</div>

</div>

<div class="bottom-nav">
  <div class="nav-item active"><span class="nav-ico">🏠</span>ホーム</div>
</div>

<script>

</body>
</html>
